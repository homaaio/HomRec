<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>HomRec — Screen recorder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --border: #1e1e28;
    --accent: #c8ff4e;
    --accent2: #4ef0ff;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --danger: #ff4e6a;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,255,78,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,78,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* subtle glow */
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,255,78,0.07) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 620px;
    padding: 2rem 1.8rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ========== CENTERED LOGO SECTION ========== */
  .logo-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
    width: 100%;
    animation: fadeDown 0.6s ease both;
  }

  .logo-symbol {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .logo-icon-svg {
    display: inline-flex;
  }

  .logo-text-central {
    font-size: 3.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #ffffff;
    background: linear-gradient(135deg, #ffffff 20%, #e0e0ff 70%);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }

  .logo-text-central span {
    color: var(--accent);
    background: linear-gradient(135deg, var(--accent), #b0ff3a);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }

  /* refined badge below logo */
  .version-badge-center {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--accent);
    background: rgba(200,255,78,0.1);
    border: 1px solid rgba(200,255,78,0.25);
    padding: 3px 12px;
    border-radius: 99px;
    letter-spacing: 0.04em;
    margin-top: 12px;
    backdrop-filter: blur(2px);
  }

  .tagline-central {
    font-size: 0.92rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-align: center;
    margin-top: 14px;
    margin-bottom: 42px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  /* card style */
  .card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    animation: fadeUp 0.6s 0.25s ease both;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(2px);
    box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,255,78,0.4), transparent);
  }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* download primary button */
  .dl-btn {
    width: 100%;
    background: var(--accent);
    color: #0a0a0c;
    border: none;
    border-radius: 14px;
    padding: 16px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: -0.02em;
    transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .dl-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .dl-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(200,255,78,0.3);
  }

  .dl-btn:hover::after {
    opacity: 1;
  }
  .dl-btn:active {
    transform: translateY(1px);
  }

  .dl-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .dl-btn:hover svg {
    transform: translateY(2px);
  }

  /* format chooser */
  .format-chooser {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transform: translateY(-8px);
    transition: max-height 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.3s, transform 0.3s;
  }

  .format-chooser.open {
    max-height: 220px;
    opacity: 1;
    transform: translateY(0);
  }

  .format-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;
    grid-column: 1/-1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .format-label::before,
  .format-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .fmt-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s, transform 0.12s;
  }

  .fmt-btn:hover {
    background: rgba(200,255,78,0.08);
    border-color: rgba(200,255,78,0.4);
    transform: translateY(-1px);
    color: var(--accent);
  }

  .fmt-btn:active {
    transform: translateY(0);
  }

  .fmt-icon {
    font-size: 1.1rem;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.3));
  }

  .divider {
    height: 1px;
    background: var(--border);
    width: 100%;
  }

  /* progress section */
  .progress-section {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .next-ver {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .next-ver .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 1.8s ease infinite;
  }

  .progress-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .progress-pct span {
    color: var(--accent2);
    font-weight: 600;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent2), #c084fc);
    width: 0%;
    transition: width 1.2s cubic-bezier(0.25, 0.8, 0.5, 1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: glow-dot 1.8s ease infinite;
  }

  .milestones {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .milestone {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    letter-spacing: 0.02em;
    transition: color 0.3s, border-color 0.3s, background 0.2s;
  }

  .milestone.done {
    color: var(--accent);
    border-color: rgba(200,255,78,0.35);
    background: rgba(200,255,78,0.07);
  }

  .footer {
    margin-top: 30px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;
    animation: fadeUp 0.6s 0.45s ease both;
  }

  .footer a {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: color 0.2s;
  }

  .footer a:hover {
    color: var(--text);
  }

  /* Keyframes */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.95); }
  }

  @keyframes glow-dot {
    0%, 100% { box-shadow: 0 0 6px var(--accent2); }
    50%       { box-shadow: 0 0 14px var(--accent2), 0 0 22px rgba(78,240,255,0.4); }
  }

  /* Responsive fine-tuning */
  @media (max-width: 500px) {
    .container {
      padding: 1.2rem;
    }
    .logo-text-central {
      font-size: 2.5rem;
    }
    .card {
      padding: 24px;
    }
    .fmt-btn {
      font-size: 0.75rem;
      padding: 10px 12px;
    }
    .milestone {
      font-size: 0.6rem;
    }
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo-main">
    <div class="logo-symbol">
      <div class="logo-icon-svg">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="4" fill="#c8ff4e" stroke="#c8ff4e" stroke-width="1.2"/>
          <circle cx="12" cy="12" r="8" stroke="#e8e8f0" stroke-width="1.5" fill="none" opacity="0.8"/>
          <path d="M12 4 A8 8 0 0 1 20 12" stroke="#4ef0ff" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="logo-text-central">Hom<span>Rec</span></div>
    </div>
    <div class="version-badge-center">v1.7.2</div>
    <div class="tagline-central">// Pure Performance. Total Freedom</div>
  </div>

  <!-- download card -->
  <div class="card">
    <div class="card-label">download assets</div>

    <button class="dl-btn" id="dlBtn" onclick="toggleFormats()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v13M6 11l6 6 6-6"/>
        <path d="M3 21h18"/>
      </svg>
      Download HomRec v1.7.2
    </button>

    <div class="format-chooser" id="formatChooser">
      <div class="format-label">archive format</div>
      <a class="fmt-btn" href="https://github.com/homaaio/HomRec/releases/download/1.7.2/v1.7.2.zip" download>
        <span class="fmt-icon">📦</span> .zip 
      </a>
      <a class="fmt-btn" href="https://github.com/homaaio/HomRec/releases/download/1.7.2/v1.7.2.7z" download>
        <span class="fmt-icon">🗜️</span> .7z 
      </a>
    </div>

    <div class="divider"></div>

    <!-- Progress + milestones -->
    <div class="progress-section">
      <div class="progress-header">
        <div class="next-ver">
          <span class="dot"></span>
          roadmap · v1.8.0
        </div>
        <div class="progress-pct">
          completion <span id="pctNum">0</span>%
        </div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="milestones" id="milestones">
        <span class="milestone done">C++ UI</span>
        <span class="milestone">More optimization</span>
        <span class="milestone">New plugin api</span>
        <span class="milestone">???</span>
        <span class="milestone">???</span>
        <span class="milestone">release build</span>
      </div>
    </div>
  </div>

  <div class="footer">
    open source · <a href="https://github.com/homaaio/HomRec" target="_blank" rel="noopener noreferrer">github.com/homaaio/HomRec</a>  ·  GPL-3.0
  </div>
</div>

<script>
  // -------------------------------------------------------------------------
  const TARGET_PCT = 21; 
  // -------------------------------------------------------------------------

  // Animate progress bar on load
  window.addEventListener('load', () => {
    // slight delay to let the CSS animations breathe
    setTimeout(() => {
      const fillEl = document.getElementById('progressFill');
      if (fillEl) fillEl.style.width = TARGET_PCT + '%';
      animateCounter(0, TARGET_PCT, 1400);
    }, 500);
  });

  // counter animation easing
  function animateCounter(from, to, duration) {
    const el = document.getElementById('pctNum');
    if (!el) return;
    const startTime = performance.now();
    function updateCounter(now) {
      const elapsed = now - startTime;
      let t = Math.min(elapsed / duration, 1);
      // easeOutCubic for smooth finish
      const easeOut = 1 - Math.pow(1 - t, 3);
      const currentVal = Math.floor(from + (to - from) * easeOut);
      el.textContent = currentVal;
      if (t < 1) {
        requestAnimationFrame(updateCounter);
      } else {
        el.textContent = to;
      }
    }
    requestAnimationFrame(updateCounter);
  }

  // toggle format dropdown with arrow & dynamic background
  let open = false;
  function toggleFormats() {
    open = !open;
    const chooser = document.getElementById('formatChooser');
    const btn = document.getElementById('dlBtn');
    if (chooser) {
      chooser.classList.toggle('open', open);
    }
    if (btn) {
      btn.style.background = open ? '#b8ef3e' : 'var(--accent)';
      // subtle style while open
      if (open) {
        btn.style.boxShadow = '0 4px 16px rgba(200,255,78,0.35)';
      } else {
        btn.style.boxShadow = '';
      }
    }
  }

  // close formats if clicking outside card area
  document.addEventListener('click', (e) => {
    if (open && !e.target.closest('.card')) {
      open = false;
      const chooser = document.getElementById('formatChooser');
      const btn = document.getElementById('dlBtn');
      if (chooser) chooser.classList.remove('open');
      if (btn) {
        btn.style.background = 'var(--accent)';
        btn.style.boxShadow = '';
      }
    }
  });

  // Optional: manually block event propagation for the button toggle to avoid conflict
  const dlButton = document.getElementById('dlBtn');
  if (dlButton) {
    dlButton.addEventListener('click', (e) => {
      e.stopPropagation();   // avoid immediate closing by document listener
    });
  }

  // small extra hover effect on format links to mimic download confirm
  const fmtLinks = document.querySelectorAll('.fmt-btn');
  fmtLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      // just a tiny feedback, don't prevent download
      console.log(`Initiating download: ${link.href}`);
    });
  });
</script>
</body>
</html>
